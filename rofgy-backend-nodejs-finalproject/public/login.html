<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Lora', serif;
      background-color: #342B24;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 400px;
      padding: 30px 60px;
      background-color: #B89D86;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      animation: float 6s ease-in-out infinite, fadeIn 1s ease-in-out forwards;
      opacity: 0;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: #EAE6DD;
      font-size: 2.2em;
      margin-bottom: 25px;
      text-align: center;
    }

    .auth-form label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #3A2F28;
    }

    .auth-form input {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #EAE6DD;
      border-radius: 8px;
      font-size: 1em;
      font-family: 'Lora', serif;
      background-color: #fffdfc;
      transition: all 0.3s ease;
    }

    .auth-form input:focus {
      outline: none;
      border-color: #8D7C6E;
      box-shadow: 0 0 6px rgba(141, 124, 110, 0.4);
    }

    .auth-form button {
      background-color: #342B24;
      color: #EAE6DD;
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      font-family: 'Lora', serif;
      font-weight: 500;
      width: 100%;
      transition: background-color 0.3s ease;
    }

    .auth-form button:hover {
      background-color: #4B3B30;
    }

    p {
      margin-top: 20px;
      font-size: 1.05em;
      color: #3A2F28;
      text-align: center;
    }

    p a {
      color: #EAE6DD;
      font-weight: bold;
      text-decoration: none;
    }

    p a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Login</h1>
    <form action="/login" method="post" class="auth-form">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required />

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="/register">Register here</a>!</p>
  </div>
</body>
</html>
